name: Update realtime snapshot

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update snapshot from Immigration APIS
        id: snapshot
        run: |
          set +e
          node scripts/update-realtime-snapshot.mjs
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

          if [ "$code" -eq 0 ]; then
            echo "Snapshot update succeeded."
            exit 0
          fi

          if [ "$code" -eq 2 ]; then
            echo "Immigration APIS unavailable from this runner; keeping existing snapshot."
            exit 0
          fi

          exit "$code"

      - name: Stop if upstream is unavailable
        if: steps.snapshot.outputs.exit_code == '2'
        run: |
          echo "Immigration APIS unavailable from this runner; keeping existing snapshot."
          exit 0

      - name: Commit snapshot
        if: steps.snapshot.outputs.exit_code == '0'
        run: |
          if git diff --quiet -- api/arrivals/realtimeSnapshot.js; then
            echo "Snapshot unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/arrivals/realtimeSnapshot.js
          git commit -m "chore: update realtime snapshot"
          git push
